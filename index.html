<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Cartão de Perfil</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background-color: white;
      width: 300px;
      padding: 20px;
      text-align: center;
      border-radius: 15px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
    }

    .card img {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 15px;
    }

    .card h2 {
      margin: 10px 0;
    }

    .card p {
      color: #555;
      font-size: 14px;
    }

    .card button {
      margin-top: 15px;
      padding: 10px 15px;
      border: none;
      border-radius: 8px;
      background-color: #4CAF50;
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    .card button:hover {
      background-color: #45a049;
    }
  </style>
</head>
<body>

  <div class="card">
    <img src="perro2.webp" alt="Foto de Perfil">
    <h2 id="nome">Cesar</h2>
    <p>Estudante de programação apaixonado por tecnologia.</p>
    <button onclick="mostrarMensagem()">Clique aqui</button>
  </div>

  <script>
    function mostrarMensagem() {
      const nome = document.getElementById("nome").innerText;
      alert("Olá, " + nome + "!");
    }
  </script>

</body>
</html>
